<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Level complete</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar">
<div class="sidebar-image-slot">
<img src="images/progress-icon-placeholder.svg" alt="Progress marker" class="sidebar-image">
</div>
<div class="progress-track">
<div class="progress-fill" id="progress-fill"></div>
</div>
<div class="sidebar-section sidebar-placeholder">
<p>More metrics &amp; menu coming soon</p>
</div>
</div>
<div class="content">
<div class="card">
<h1>Level complete!</h1>
<p id="final-score" class="correct-answer"></p>
<p>Nice work - you reached the points needed to pass this level.</p>
<a href="mainmenu.html" class="btn">Back to main menu</a>
</div>
</div>
<script type="module">
import { requireAuth, getLevelState } from "./js/game.js";
import { applyProgressBar } from "./js/sidebar.js";

requireAuth(async (user) => {
  const state = await getLevelState(user.uid);
  const score = state ? state.score : 0;
  document.getElementById("final-score").textContent =
    state ? `Final score: ${state.score} points` : "";
  applyProgressBar(score);
});
</script>
</body>
</html>
