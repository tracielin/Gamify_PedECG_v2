<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Correct! - Question 3</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
<p class="score-display" id="score-display"></p>
<h2>Correct!</h2>
<p class="correct-answer">Correct answer: No, this is abnormally prolonged for a neonate</p>
<p>Correct. Neonatal QRS durations are normally quite narrow (typically well under 90 ms), so 100 ms represents prolongation and should prompt evaluation for a conduction abnormality.</p>
<button id="continue-btn" class="btn">Continue</button>
</div>
<script type="module">
import { requireAuth, getLevelState, determineNextDestination } from "./js/game.js";

requireAuth(async (user) => {
  const state = await getLevelState(user.uid);
  document.getElementById("score-display").textContent =
    state ? `Current score: ${state.score}` : "";

  document.getElementById("continue-btn").addEventListener("click", async () => {
    const next = await determineNextDestination(user.uid);
    window.location.href = next;
  });
});
</script>
</body>
</html>
