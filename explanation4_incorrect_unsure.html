<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Not quite - Question 4</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
<p class="score-display" id="score-display"></p>
<h2>Not quite</h2>
<p class="correct-answer">Correct answer: This is a prolonged QTc, warranting further evaluation</p>
<p>Not quite. A QTc around 480 ms is above the typical upper limit of normal for children, which generally falls in the 440-460 ms range, so this value should be flagged as prolonged rather than normal.</p>
<button id="continue-btn" class="btn">Continue</button>
</div>
<script type="module">
import { requireAuth, getLevelState, determineNextDestination } from "./js/game.js";

requireAuth(async (user) => {
  const state = await getLevelState(user.uid);
  document.getElementById("score-display").textContent =
    state ? `Current score: ${state.score}` : "";

  document.getElementById("continue-btn").addEventListener("click", async () => {
    const next = await determineNextDestination(user.uid);
    window.location.href = next;
  });
});
</script>
</body>
</html>
