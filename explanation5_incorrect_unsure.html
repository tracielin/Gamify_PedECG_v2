<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Not quite - Question 5</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
<p class="score-display" id="score-display"></p>
<h2>Not quite</h2>
<p class="correct-answer">Correct answer: Supraventricular tachycardia (SVT)</p>
<p>Not quite. The combination of an unusually fast, perfectly regular rate with no visible P waves is atypical for sinus tachycardia, which normally shows some rate variability and clear P waves. This pattern points to SVT instead.</p>
<button id="continue-btn" class="btn">Continue</button>
</div>
<script type="module">
import { requireAuth, getLevelState, determineNextDestination } from "./js/game.js";

requireAuth(async (user) => {
  const state = await getLevelState(user.uid);
  document.getElementById("score-display").textContent =
    state ? `Current score: ${state.score}` : "";

  document.getElementById("continue-btn").addEventListener("click", async () => {
    const next = await determineNextDestination(user.uid);
    window.location.href = next;
  });
});
</script>
</body>
</html>
