<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Not quite - Question 6</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
<p class="score-display" id="score-display"></p>
<h2>Not quite</h2>
<p class="correct-answer">Correct answer: Mobitz Type I (Wenckebach)</p>
<p>Not quite. The key distinguishing feature here is that the PR interval gets progressively longer before the dropped beat — that gradual lengthening pattern is specific to Mobitz Type I (Wenckebach), rather than Mobitz Type II or complete block.</p>
<button id="continue-btn" class="btn">Continue</button>
</div>
<script type="module">
import { requireAuth, getLevelState, determineNextDestination } from "./js/game.js";

requireAuth(async (user) => {
  const state = await getLevelState(user.uid);
  document.getElementById("score-display").textContent =
    state ? `Current score: ${state.score}` : "";

  document.getElementById("continue-btn").addEventListener("click", async () => {
    const next = await determineNextDestination(user.uid);
    window.location.href = next;
  });
});
</script>
</body>
</html>
