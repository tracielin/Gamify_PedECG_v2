<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Level failed</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar">
<div class="sidebar-image-slot">
<img src="images/progress-icon-placeholder.svg" alt="Goal marker" class="sidebar-image">
</div>
<div class="progress-track">
<div class="progress-half progress-half-positive">
<div class="progress-fill progress-fill-positive" id="progress-fill-positive"></div>
</div>
<div class="progress-baseline"></div>
<div class="progress-half progress-half-negative">
<div class="progress-fill progress-fill-negative" id="progress-fill-negative"></div>
</div>
<div class="progress-marker" id="progress-marker">
<img src="images/progress-marker-placeholder.svg" alt="Progress character">
</div>
</div>
<div class="sidebar-section sidebar-placeholder">
<p>More metrics &amp; menu coming soon</p>
</div>
</div>
<div class="content">
<div class="card">
<h1>Level failed</h1>
<p id="final-score"></p>
<p>You didn't reach 5 points within 6 questions this time. This attempt has been recorded. You can retry the level, review the material first, or head back to the main menu.</p>
<button id="retry-btn" class="btn">Retry level</button>
<a href="didactic.html" class="btn secondary">Review material</a>
<a href="mainmenu.html" class="btn secondary">Main menu</a>
</div>
</div>
<script type="module">
import { requireAuth, getLevelState, initLevelState, pickRandomFirstQuestion } from "./js/game.js";
import { applyProgressBar } from "./js/sidebar.js";

requireAuth(async (user) => {
  const state = await getLevelState(user.uid);
  const score = state ? state.score : 0;
  document.getElementById("final-score").textContent =
    state ? `Final score: ${state.score} points` : "";
  applyProgressBar(score);

  document.getElementById("retry-btn").addEventListener("click", async () => {
    await initLevelState(user.uid);
    window.location.href = pickRandomFirstQuestion();
  });
});
</script>
</body>
</html>
