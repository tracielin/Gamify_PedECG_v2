<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question 1</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar">
<div class="sidebar-image-slot">
<img src="images/progress-icon-placeholder.svg" alt="Goal marker" class="sidebar-image">
</div>
<div class="progress-track">
<div class="progress-half progress-half-positive">
<div class="progress-fill progress-fill-positive" id="progress-fill-positive"></div>
</div>
<div class="progress-baseline"></div>
<div class="progress-half progress-half-negative">
<div class="progress-fill progress-fill-negative" id="progress-fill-negative"></div>
</div>
<div class="progress-marker" id="progress-marker">
<img src="images/progress-marker-placeholder.svg" alt="Progress character">
</div>
</div>
<div class="sidebar-section sidebar-placeholder">
<p>More metrics &amp; menu coming soon</p>
</div>
</div>
<div class="content">
<div class="card">
<p class="score-display" id="score-display"></p>
<h2>Question 1 of 6</h2>
<p>A 4-year-old patient's ECG shows a heart rate of 150 bpm with a normal P wave before every QRS complex. What is the most likely rhythm?</p>
<form id="answer-form">
<div class="choices">
<label><input type="radio" name="choice" value="0" required> Normal sinus rhythm for this age</label>
<label><input type="radio" name="choice" value="1"> Supraventricular tachycardia (SVT)</label>
<label><input type="radio" name="choice" value="2"> Sinus bradycardia</label>
</div>
<h3>How confident are you in this answer?</h3>
<div class="choices">
<label><input type="radio" name="confidence" value="high" required> High confidence</label>
<label><input type="radio" name="confidence" value="low"> Low confidence</label>
</div>
<button type="submit" class="btn">Submit answer</button>
</form>
</div>
</div>
<script type="module">
import { requireAuth, getLevelState, recordAnswer, explanationPageFor } from "./js/game.js";
import { applyProgressBar } from "./js/sidebar.js";

const QUESTION_ID = 1;
const CORRECT_INDEX = 0;

requireAuth(async (user) => {
  const state = await getLevelState(user.uid);
  const score = state ? state.score : 0;
  document.getElementById("score-display").textContent =
    state ? `Current score: ${state.score}` : "";
  applyProgressBar(score);

  document.getElementById("answer-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const choice = parseInt(document.querySelector('input[name="choice"]:checked').value, 10);
    const confidence = document.querySelector('input[name="confidence"]:checked').value;
    const isCorrect = choice === CORRECT_INDEX;
    await recordAnswer(user.uid, QUESTION_ID, isCorrect, confidence);
    window.location.href = explanationPageFor(QUESTION_ID, isCorrect, confidence);
  });
});
</script>
</body>
</html>
