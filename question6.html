<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question 6</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar">
<div class="sidebar-image-slot">
<img src="images/progress-icon-placeholder.svg" alt="Progress marker" class="sidebar-image">
</div>
<div class="progress-track">
<div class="progress-fill" id="progress-fill"></div>
</div>
<div class="sidebar-section sidebar-placeholder">
<p>More metrics &amp; menu coming soon</p>
</div>
</div>
<div class="content">
<div class="card">
<p class="score-display" id="score-display"></p>
<h2>Question 6 of 6</h2>
<p>On an ECG rhythm strip, you observe a progressively lengthening PR interval across several beats until a QRS complex is dropped, then the pattern restarts. What type of AV block is this?</p>
<form id="answer-form">
<div class="choices">
<label><input type="radio" name="choice" value="0" required> Mobitz Type I (Wenckebach)</label>
<label><input type="radio" name="choice" value="1"> Mobitz Type II</label>
<label><input type="radio" name="choice" value="2"> Third-degree (complete) AV block</label>
</div>
<h3>How confident are you in this answer?</h3>
<div class="choices">
<label><input type="radio" name="confidence" value="high" required> High confidence</label>
<label><input type="radio" name="confidence" value="low"> Low confidence</label>
</div>
<button type="submit" class="btn">Submit answer</button>
</form>
</div>
</div>
<script type="module">
import { requireAuth, getLevelState, recordAnswer, explanationPageFor } from "./js/game.js";
import { applyProgressBar } from "./js/sidebar.js";

const QUESTION_ID = 6;
const CORRECT_INDEX = 0;

requireAuth(async (user) => {
  const state = await getLevelState(user.uid);
  const score = state ? state.score : 0;
  document.getElementById("score-display").textContent =
    state ? `Current score: ${state.score}` : "";
  applyProgressBar(score);

  document.getElementById("answer-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const choice = parseInt(document.querySelector('input[name="choice"]:checked').value, 10);
    const confidence = document.querySelector('input[name="confidence"]:checked').value;
    const isCorrect = choice === CORRECT_INDEX;
    await recordAnswer(user.uid, QUESTION_ID, isCorrect, confidence);
    window.location.href = explanationPageFor(QUESTION_ID, isCorrect, confidence);
  });
});
</script>
</body>
</html>
